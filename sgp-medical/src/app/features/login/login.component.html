<div class="login-container">
  <div class="login-box">
    <div class="header">
      <div class="logo-icon">🏥</div>
      <h1>SGP Médical</h1>
      <p class="subtitle">Système de Gestion de Patients</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <!-- Email -->
      <div class="form-group">
        <label for="email">
          <span class="icon">✉️</span>
          Email
        </label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="votre.email@example.com"
          [class.is-invalid]="submitted && email?.invalid"
        />
        <div class="error-message" *ngIf="submitted && email?.invalid">
          <span *ngIf="email?.errors?.['required']">Email requis</span>
          <span *ngIf="email?.errors?.['email']">Format email invalide</span>
        </div>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label for="password">
          <span class="icon">🔒</span>
          Mot de passe
        </label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="Entrez votre mot de passe"
          [class.is-invalid]="submitted && password?.invalid"
        />
        <div class="error-message" *ngIf="submitted && password?.invalid">
          <span *ngIf="password?.errors?.['required']">Mot de passe requis</span>
          <span *ngIf="password?.errors?.['minlength']">Minimum 6 caractères</span>
        </div>
      </div>

      <!-- Role Selection -->
      <div class="form-group">
        <label for="role">
          <span class="icon">👤</span>
          Rôle
        </label>
        <select id="role" formControlName="role">
          <option *ngFor="let r of roles; trackBy: trackByIndex" [value]="r">
            {{ getRoleLabel(r) }}
          </option>
        </select>
      </div>

      <!-- Submit Button -->
      <button
        type="submit"
        class="btn-primary"
        [disabled]="loading || loginForm.invalid"
      >
        <span class="button-icon">→</span>
        {{ loading ? 'Connexion en cours...' : 'Se connecter' }}
      </button>
    </form>

    <div class="footer">
      <p>Connexion sécurisée | SGP © 2024</p>
    </div>
  </div>
</div>
